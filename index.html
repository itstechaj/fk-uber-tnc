<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Flipkart…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 40px 32px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e0e0e0;
      border-top-color: #2874f0;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 18px; margin-bottom: 8px; }
    p  { font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.5; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px 28px;
      background: #2874f0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background .2s;
      margin-bottom: 10px;
      -webkit-appearance: none;
    }
    .btn:hover { background: #1a5dc8; }
    .btn-secondary {
      background: transparent;
      color: #2874f0;
      border: 2px solid #2874f0;
      font-size: 14px;
      padding: 10px 28px;
    }
    .btn-secondary:hover { background: #f0f5ff; }
    .hidden { display: none; }
    .status { font-size: 12px; color: #999; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Opening Flipkart…</h1>
    <p id="subtitle">You will be redirected automatically.</p>

    <button id="openBtn" class="btn hidden" onclick="handleOpenClick()">
      Open Flipkart
    </button>
    <button id="browserBtn" class="btn btn-secondary hidden" onclick="handleBrowserClick()">
      Open in Browser Instead
    </button>
    <div id="status" class="status hidden"></div>
  </div>

  <!-- Hidden iframe used to silently fire intent URIs -->
  <iframe id="intentFrame" style="display:none;width:0;height:0;border:0;" sandbox="allow-top-navigation"></iframe>

  <script>
    (function () {
      var TARGET_URL = "https://www.flipkart.com/pages/supercoin-uber-tnc";
      var FK_PACKAGE = "com.flipkart.android";

      var INTENT_APP =
        "intent://www.flipkart.com/pages/supercoin-uber-tnc" +
        "#Intent;" +
        "scheme=https;" +
        "package=" + FK_PACKAGE + ";" +
        "S.browser_fallback_url=" + encodeURIComponent(TARGET_URL) + ";" +
        "end";

      var INTENT_BROWSER =
        "intent://www.flipkart.com/pages/supercoin-uber-tnc" +
        "#Intent;" +
        "scheme=https;" +
        "action=android.intent.action.VIEW;" +
        "category=android.intent.category.BROWSABLE;" +
        "end";

      var ua = navigator.userAgent || "";

      function isAndroid() { return /android/i.test(ua); }
      function isIOS()     { return /iphone|ipad|ipod/i.test(ua); }

      function isWebView() {
        if (!isAndroid()) return false;
        /* Common WebView indicators on Android */
        return /wv\b/.test(ua) ||
               (/Android/.test(ua) && /Version\/[\d.]+/.test(ua) && !/Chrome/.test(ua)) ||
               /\bFB[A-Z]|Instagram|Uber|Line\//i.test(ua);
      }

      function setStatus(msg) {
        var el = document.getElementById("status");
        el.textContent = msg;
        el.classList.remove("hidden");
      }

      function showButtons() {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("title").textContent = "Tap to continue";
        document.getElementById("subtitle").textContent =
          "Tap the button below to open this page in Flipkart.";
        document.getElementById("openBtn").classList.remove("hidden");
        document.getElementById("browserBtn").classList.remove("hidden");
      }

      /* ---- Attempt strategies to escape the WebView ---- */

      function tryIntentViaIframe(intentUrl) {
        try {
          var frame = document.getElementById("intentFrame");
          frame.src = intentUrl;
        } catch (e) { /* swallow */ }
      }

      function tryIntentViaLocation(intentUrl) {
        try {
          window.location.href = intentUrl;
        } catch (e) { /* swallow */ }
      }

      function tryWindowOpen(url) {
        try {
          var w = window.open(url, "_blank");
          if (w) return true;
          w = window.open(url, "_system");
          if (w) return true;
        } catch (e) { /* swallow */ }
        return false;
      }

      function tryAnchorClick(url) {
        try {
          var a = document.createElement("a");
          a.href = url;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.style.display = "none";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          return true;
        } catch (e) { /* swallow */ }
        return false;
      }

      /* ---- Click handlers (user-initiated = higher WebView trust) ---- */

      window.handleOpenClick = function () {
        setStatus("Trying to open Flipkart app…");

        tryIntentViaLocation(INTENT_APP);

        setTimeout(function () {
          tryIntentViaIframe(INTENT_APP);
        }, 300);

        setTimeout(function () {
          tryWindowOpen(INTENT_APP);
        }, 600);

        setTimeout(function () {
          setStatus("If nothing happened, try 'Open in Browser Instead'.");
        }, 2000);
      };

      window.handleBrowserClick = function () {
        setStatus("Opening in browser…");

        tryIntentViaLocation(INTENT_BROWSER);

        setTimeout(function () {
          if (!tryWindowOpen(TARGET_URL)) {
            tryAnchorClick(TARGET_URL);
          }
        }, 300);

        setTimeout(function () {
          window.location.href = TARGET_URL;
        }, 800);

        setTimeout(function () {
          setStatus("Still here? Use your browser's menu (⋮) → 'Open in Chrome'.");
        }, 2500);
      };

      /* ---- Auto-attempt on page load ---- */

      if (isAndroid()) {
        if (isWebView()) {
          /*
           * Inside a WebView (likely Uber):
           * Auto-attempts often get blocked, so fire a quick intent
           * attempt via iframe then immediately show manual buttons.
           */
          tryIntentViaIframe(INTENT_APP);

          setTimeout(function () {
            tryIntentViaLocation(INTENT_APP);
          }, 200);

          setTimeout(showButtons, 800);

        } else {
          /* Real browser — intent:// works reliably here */
          window.location.replace(INTENT_APP);
          setTimeout(showButtons, 2000);
        }

      } else if (isIOS()) {
        window.location.replace(TARGET_URL);
        setTimeout(showButtons, 2500);

      } else {
        window.location.replace(TARGET_URL);
      }
    })();
  </script>
</body>
</html>
